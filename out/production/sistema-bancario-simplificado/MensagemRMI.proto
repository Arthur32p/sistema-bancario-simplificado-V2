syntax = "proto3";

option java_package = "com.banco.protocolo";
option java_multiple_files = true;
option java_outer_classname = "MensagemProtocolo";

message MensagemRMI {
  int32 messageType = 1;
  int32 requestId = 2;
  string objectReference = 3;
  string methodId = 4;
  bytes arguments = 5;
}

// Operações (Request)

// 1
message CadastroRequest{
  string nome = 1;
  string cpf = 2;
  string senha = 3;
  int32 tipo = 4;
}

// 2
message LoginRequest{
  string cpf = 1;
  string senha = 2;
  int32 tipo = 3;
}

// 3
message SacarRequest{
  int32 numeroSaque = 1;
  double valorSaque = 2;
}

// 4
message DepositoRequest{
  int32 numeroDeposito = 1;
  double valorDeposito = 2;
}


// 5
message TransferirRequest{
  int32 numOrigem = 1;
  int32 numDestino = 2;
  double valor = 3;
}

// 6
message PagarRequest{
  int32 numContaPag = 1;
  double valorPag = 2;
  string descricao = 3;
}

// 7
message ProjetarRendimentoRequest{
  int32 numeroRendimento = 1;
  int32 meses = 2;
}

// 8
message ExtratoRequest{
  int32 numContaExtrato = 1;
}

// Operações (Response)

message StatusResponse {
  int32 status = 1;
}

message LoginResponse {
  int32 status = 1;
  int32 numeroConta = 2;
}

message TransferirResponse {
  int32 status = 1;
  string nomeDestino = 2;
}

message RendimentoResponse {
  int32 status = 1;
  double valorResultado = 2;
}

message ExtratoResponse {
  int32 status = 1;
  repeated string linhas = 2;
}